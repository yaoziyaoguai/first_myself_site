<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- 黑色背景 -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- 中央内容 -->
  <g transform="translate(600, 315)">
    <!-- 首字母 JW -->
    <text
      x="0"
      y="-20"
      text-anchor="middle"
      fill="#ffffff"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="120"
      font-weight="300"
      letter-spacing="8"
    >JW</text>

    <!-- 分隔线 -->
    <line
      x1="-60"
      y1="30"
      x2="60"
      y2="30"
      stroke="#ffffff"
      stroke-width="1"
      opacity="0.5"
    />

    <!-- 名字 -->
    <text
      x="0"
      y="80"
      text-anchor="middle"
      fill="#ffffff"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="24"
      font-weight="400"
      opacity="0.9"
    >Jinkun Wang</text>

    <!-- 描述 -->
    <text
      x="0"
      y="120"
      text-anchor="middle"
      fill="#ffffff"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="16"
      font-weight="300"
      opacity="0.6"
    >Personal Website</text>
  </g>
</svg>
